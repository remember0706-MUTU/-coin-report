name: ICT Report Scheduler

on:
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  run-ict-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Decode Naver cookies
        env:
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
        run: |
          if [ -n "$NAVER_COOKIES" ]; then
            echo "$NAVER_COOKIES" | base64 -d > naver_cookies.json
            echo "✅ 네이버 쿠키 파일 생성 완료"
          else
            echo "⚠️  NAVER_COOKIES 시크릿 없음 — 블로그 발행 건너뜀"
          fi

      - name: Run ICT Report + Naver Blog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python ict_writer.py
