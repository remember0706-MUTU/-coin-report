name: ICT Report Scheduler

on:
  workflow_dispatch:
    inputs:
      time_slot:
        description: '실행 시간 슬롯 (09 / 13 / 17 / 21)'
        required: false
        default: '09'
        type: choice
        options:
          - '09'
          - '13'
          - '17'
          - '21'

jobs:
  run-ict-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ICT Report (텔레그램 — 모든 시간 실행)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python ict_writer.py

      - name: Install Playwright + Xvfb (17시·21시만)
        if: ${{ inputs.time_slot == '17' || inputs.time_slot == '21' }}
        run: |
          sudo apt-get install -y xvfb xclip
          playwright install --with-deps chromium

      - name: 네이버 블로그 발행 (17시·21시만)
        if: ${{ inputs.time_slot == '17' || inputs.time_slot == '21' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          NAVER_COOKIES: ${{ secrets.NAVER_COOKIES }}
          TIME_SLOT: ${{ inputs.time_slot }}
        run: xvfb-run -a python blog_main.py
